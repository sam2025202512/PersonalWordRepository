openapi: 3.0.3
info:
  title: Personal Word Repository API
  version: "1.0.0"
  description: |
    REST API for storing, categorizing, and translating personal vocabulary.
servers:
  - url: http://127.0.0.1:5000
tags:
  - name: Users
  - name: Words
  - name: Translations
  - name: Categories
  - name: Parts of Speech
paths:
  /users:
    get:
      tags: [Users]
      summary: List all users
      description: Returns all users when a valid bearer token is provided.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
              examples:
                one-user:
                  value:
                    - id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                      email: test@example.com
                      created_at: "2026-03-09T18:55:11.318191"
                multiple-users:
                  value:
                    - id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                      email: test@example.com
                      created_at: "2026-03-09T18:55:11.318191"
                    - id: c1fffb6a-1841-49df-ae53-babdb9958b7f
                      email: anna@example.com
                      created_at: "2026-03-10T12:00:00.000000"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: unauthorized
    post:
      tags: [Users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
            examples:
              basic:
                value:
                  email: student@example.com
                  password: secret123
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                email: student@example.com
                created_at: "2026-03-09T18:55:11.318191"
        "400":
          description: Required fields are missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: email and password are required
        "409":
          description: Email is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: email already in use
  /users/{user_id}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Users]
      summary: Get one user
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                email: student@example.com
                created_at: "2026-03-09T18:55:11.318191"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: user not found
    put:
      tags: [Users]
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
            examples:
              change-email:
                value:
                  email: updated@example.com
              change-password:
                value:
                  password: newsecret123
              change-both:
                value:
                  email: updated@example.com
                  password: newsecret123
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                email: updated@example.com
                created_at: "2026-03-09T18:55:11.318191"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: user not found
        "409":
          description: Email is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: email already in use
    delete:
      tags: [Users]
      summary: Delete a user
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                message: user deleted
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: user not found
  /words:
    get:
      tags: [Words]
      summary: List words
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter words by owner id.
        - name: language
          in: query
          schema:
            type: string
          description: Filter words by source language.
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter words that belong to a category.
        - name: search
          in: query
          schema:
            type: string
          description: Case-insensitive text search against the word text.
      responses:
        "200":
          description: Filtered word list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Word"
              examples:
                by-user:
                  value:
                    - id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                      user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                      text: run
                      language: en
                      part_of_speech_id: 2
                      categories: []
    post:
      tags: [Words]
      summary: Create a word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordCreate"
            examples:
              minimal:
                value:
                  text: run
                  language: en
                  user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                  part_of_speech_id: 1
              with-categories:
                value:
                  text: cat
                  language: en
                  user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                  part_of_speech_id: 1
                  category_ids:
                    - 8dc4bffa-c17c-449f-86f2-d9e3e8782339
                    - 4f601270-00db-49f4-bb51-6d4e4f98104f
      responses:
        "201":
          description: Word created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"
              examples:
                no-categories:
                  value:
                    id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                    user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                    text: run
                    language: en
                    part_of_speech_id: 2
                    categories: []
                with-categories:
                  value:
                    id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                    user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                    text: cat
                    language: en
                    part_of_speech_id: 1
                    categories:
                      - 8dc4bffa-c17c-449f-86f2-d9e3e8782339
        "400":
          description: Required fields are missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: text, language, user_id and part_of_speech_id are required
        "404":
          description: User or part of speech was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                user:
                  value:
                    error: user not found
                part-of-speech:
                  value:
                    error: part_of_speech not found
  /words/{word_id}:
    parameters:
      - $ref: "#/components/parameters/WordId"
    get:
      tags: [Words]
      summary: Get one word
      responses:
        "200":
          description: Word found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"
              example:
                id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                text: run
                language: en
                part_of_speech_id: 2
                categories: []
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: word not found
    put:
      tags: [Words]
      summary: Update a word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordUpdate"
            examples:
              rename-word:
                value:
                  text: running
              change-language-and-pos:
                value:
                  language: fi
                  part_of_speech_id: 3
              replace-categories:
                value:
                  category_ids:
                    - 8dc4bffa-c17c-449f-86f2-d9e3e8782339
      responses:
        "200":
          description: Word updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"
              example:
                id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                text: running
                language: en
                part_of_speech_id: 2
                categories: []
        "404":
          description: Word or part of speech not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                word:
                  value:
                    error: word not found
                part-of-speech:
                  value:
                    error: part_of_speech not found
    delete:
      tags: [Words]
      summary: Delete a word
      responses:
        "200":
          description: Word deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                message: word deleted
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: word not found
  /words/{word_id}/translations:
    parameters:
      - $ref: "#/components/parameters/WordId"
    get:
      tags: [Translations]
      summary: List translations for a word
      responses:
        "200":
          description: Translation list for the word
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Translation"
              examples:
                empty:
                  value: []
                populated:
                  value:
                    - id: 3128f4e3-f98a-4464-8cd0-adb8818d3fa6
                      word_id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                      text: juosta
                      language: fi
                      note: common verb
                    - id: 1b097f87-4167-4c7f-b69c-f5ce9639e8da
                      word_id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                      text: courir
                      language: fr
                      note: null
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: word not found
    post:
      tags: [Translations]
      summary: Create a translation for a word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationCreate"
            examples:
              with-note:
                value:
                  text: juosta
                  language: fi
                  note: common verb
              without-note:
                value:
                  text: courir
                  language: fr
      responses:
        "201":
          description: Translation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Translation"
              examples:
                with-note:
                  value:
                    id: 3128f4e3-f98a-4464-8cd0-adb8818d3fa6
                    word_id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                    text: juosta
                    language: fi
                    note: common verb
                without-note:
                  value:
                    id: 1b097f87-4167-4c7f-b69c-f5ce9639e8da
                    word_id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                    text: courir
                    language: fr
                    note: null
        "400":
          description: Required fields are missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: text and language are required
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: word not found
  /translations/{translation_id}:
    parameters:
      - $ref: "#/components/parameters/TranslationId"
    get:
      tags: [Translations]
      summary: Get one translation
      responses:
        "200":
          description: Translation found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Translation"
              example:
                id: 3128f4e3-f98a-4464-8cd0-adb8818d3fa6
                word_id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                text: juosta
                language: fi
                note: common verb
        "404":
          description: Translation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: translation not found
    put:
      tags: [Translations]
      summary: Update a translation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationUpdate"
            examples:
              text-only:
                value:
                  text: juosta
              full-update:
                value:
                  text: springa
                  language: sv
                  note: colloquial
      responses:
        "200":
          description: Translation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Translation"
              example:
                id: 3128f4e3-f98a-4464-8cd0-adb8818d3fa6
                word_id: 50d55fa6-166d-4cb6-a023-9d932dce5a7f
                text: springa
                language: sv
                note: colloquial
        "404":
          description: Translation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: translation not found
    delete:
      tags: [Translations]
      summary: Delete a translation
      responses:
        "200":
          description: Translation deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                message: translation deleted
        "404":
          description: Translation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: translation not found
  /categories:
    get:
      tags: [Categories]
      summary: List categories
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter categories by owner id.
      responses:
        "200":
          description: Filtered category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
              examples:
                by-user:
                  value:
                    - id: 8dc4bffa-c17c-449f-86f2-d9e3e8782339
                      user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                      name: animals
                      words: []
    post:
      tags: [Categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreate"
            example:
              name: animals
              user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
              example:
                id: 8dc4bffa-c17c-449f-86f2-d9e3e8782339
                user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                name: animals
                words: []
        "400":
          description: Required fields are missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: name and user_id are required
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: user not found
        "409":
          description: Duplicate category name for the same user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: category already exists for user
  /categories/{category_id}:
    parameters:
      - $ref: "#/components/parameters/CategoryId"
    get:
      tags: [Categories]
      summary: Get one category
      responses:
        "200":
          description: Category found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
              examples:
                empty:
                  value:
                    id: 8dc4bffa-c17c-449f-86f2-d9e3e8782339
                    user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                    name: animals
                    words: []
                with-words:
                  value:
                    id: 8dc4bffa-c17c-449f-86f2-d9e3e8782339
                    user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                    name: animals
                    words:
                      - 50d55fa6-166d-4cb6-a023-9d932dce5a7f
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: category not found
    put:
      tags: [Categories]
      summary: Update a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
            example:
              name: verbs
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
              example:
                id: 8dc4bffa-c17c-449f-86f2-d9e3e8782339
                user_id: 24f7376f-d0ce-4412-8d1e-c3642ec696df
                name: verbs
                words: []
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: category not found
        "409":
          description: Duplicate category name for the same user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: category already exists for user
    delete:
      tags: [Categories]
      summary: Delete a category
      responses:
        "200":
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                message: category deleted
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: category not found
  /parts-of-speech:
    get:
      tags: [Parts of Speech]
      summary: List all parts of speech
      responses:
        "200":
          description: A list of parts of speech
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartOfSpeech"
              examples:
                default-values:
                  value:
                    - id: 1
                      code: noun
                      name: Noun
                      words: []
                    - id: 2
                      code: verb
                      name: Verb
                      words:
                        - 50d55fa6-166d-4cb6-a023-9d932dce5a7f
    post:
      tags: [Parts of Speech]
      summary: Create a part of speech
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartOfSpeechCreate"
            example:
              code: adverb
              name: Adverb
      responses:
        "201":
          description: Part of speech created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartOfSpeech"
              example:
                id: 4
                code: adverb
                name: Adverb
                words: []
        "400":
          description: Required fields are missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: name and code are required
        "409":
          description: Part of speech already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: part of speech already exists
  /parts-of-speech/{pos_id}:
    parameters:
      - $ref: "#/components/parameters/PartOfSpeechId"
    put:
      tags: [Parts of Speech]
      summary: Update a part of speech
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartOfSpeechUpdate"
            example:
              name: Verb
      responses:
        "200":
          description: Part of speech updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartOfSpeech"
              example:
                id: 2
                code: verb
                name: Verb
                words: []
        "404":
          description: Part of speech not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: part of speech not found
    delete:
      tags: [Parts of Speech]
      summary: Delete a part of speech
      responses:
        "200":
          description: Part of speech deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                message: part of speech deleted
        "404":
          description: Part of speech not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: part of speech not found
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: Use `Bearer API_KEY_12345`.
  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WordId:
      name: word_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TranslationId:
      name: translation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CategoryId:
      name: category_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PartOfSpeechId:
      name: pos_id
      in: path
      required: true
      schema:
        type: integer
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: user not found
    Message:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: word deleted
    User:
      type: object
      required: [id, email, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
    UserCreate:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    UserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
      additionalProperties: false
    Word:
      type: object
      required: [id, user_id, text, language, part_of_speech_id, categories]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        text:
          type: string
